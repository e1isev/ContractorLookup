<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Suburb/Postcode Finder</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="left-panel" aria-label="Search panel">
        <h1>Suburb or Postcode Map Search</h1>
        <p class="panel-copy">Search is currently limited to Australian locations.</p>
        <form id="search-form" class="search-form" autocomplete="off">
          <label for="query" class="sr-only">Search suburb or postcode</label>
          <input
            id="query"
            name="query"
            type="text"
            placeholder="Search suburb or postcode (e.g. 2000, Fitzroy)"
            list="postcode-suggestions"
            required
          />
          <datalist id="postcode-suggestions"></datalist>
          <button type="submit">Search</button>
        </form>
        <p class="hint-text">Tip: start typing a postcode to see suburb suggestions.</p>
        <p id="status" role="status" aria-live="polite">Enter a suburb or postcode to begin.</p>
      </aside>

      <main>
        <div id="map" aria-label="Map"></div>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
